{{ define "main" }}
<section>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="card-title mb-4 text-center">{{ .Title }}</h1>

                        <form id="contact-form">
                            <div class="d-none" aria-hidden="true">
                                <input type="text" name="honeypot" id="honeypot" tabindex="-1" autocomplete="off">
                            </div>
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="name" name="name" placeholder="Jane Doe"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    placeholder="name@example.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" name="message" rows="5"
                                    placeholder="How can we help?" required></textarea>
                            </div>

                            <div class="d-grid">
                                <button type="submit" id="submit-btn" class="btn btn-primary btn-lg">
                                    Send Message
                                </button>
                            </div>
                        </form>

                        <div id="response-msg" class="mt-4 alert d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="ps-lg-4">
                    <div class="mb-5">
                        <h3 class="h4 border-bottom pb-2 mb-3">Our Location</h3>
                        <address class="text-muted">
                            <strong>BluePoint Living</strong><br>
                            13902 N Dale Mabry Hwy<br>
                            Suite 122<br>
                            Tampa, FL 33618<br>
                            <abbr title="Phone">P:</abbr> 1 (888) 530-7813
                        </address>
                    </div>

                    <div>
                        <h3 class="h4 border-bottom pb-2 mb-3">Operating Hours</h3>
                        <table class="table table-borderless table-sm text-muted">
                            <tbody>
                                <tr>
                                    <th scope="row" class="ps-0 w-50">Monday - Friday</th>
                                    <td class="text-end">9:00 AM - 6:00 PM</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="ps-0">Saturday</th>
                                    <td class="text-end">10:00 AM - 4:00 PM</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="ps-0">Sunday</th>
                                    <td class="text-end text-danger">Closed</td>
                                </tr>
                            </tbody>
                        </table>
                        <p class="small text-muted mt-3">
                            <i class="bi bi-info-circle"></i> Holiday hours may vary. Please call ahead.
                        </p>
                    </div>
                </div>
            </div>
</section>
{{ end }}
